<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧰 模拟学习申报系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
        }

        .header-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .search-box {
            display: flex;
            background: white;
            border-radius: 50px;
            padding: 0.5rem;
            box-shadow: var(--shadow);
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        .search-input {
            flex: 1;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            outline: none;
            border-radius: 50px;
        }

        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .search-btn:hover { background: var(--primary-dark); }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .tool-card.disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .tool-card.disabled:hover {
            transform: none;
            border-color: transparent;
        }

        .tool-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .tool-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .tool-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
            line-height: 1.5;
        }

        .tool-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 1rem;
            text-decoration: none;
        }

        .tool-card.disabled .tool-link {
            color: var(--text-sub);
        }

        .arrow { transition: transform 0.3s; }
        .tool-link:hover .arrow { transform: translateX(4px); }

        .footer {
            text-align: center;
            color: white;
            padding: 3rem 0 2rem;
            margin-top: 3rem;
        }

        .footer-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .footer-box p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 3rem;
            display: none;
        }

        .empty-state.active { display: block; }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.6; }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .tools-grid { grid-template-columns: 1fr; }
            .search-box { flex-direction: column; border-radius: 16px; }
            .search-input { border-radius: 12px; margin-bottom: 0.5rem; }
            .search-btn { width: 100%; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-icon">🧰</div>
            <h1>模拟学习申报系统</h1>
            <p>模拟真实申报系统界面</p>
        </header>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索工具..." autocomplete="off">
            <button class="search-btn" onclick="searchTools()">搜索</button>
        </div>

        <div class="tools-grid" id="toolsGrid"></div>
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🔍</div>
            <h3>未找到相关工具</h3>
        </div>

        <footer class="footer">
            <div class="footer-box">
                <p>⚠️ 计算结果仅供学习交流，具体以相关规定为准</p>
                <p>📱 微信：13519445134 欢迎交流</p>
            </div>
            <p>© 2026 模拟申报系统，助力您工作高效高能</p>
        </footer>
    </div>

    <script>
        const tools = [
            { title: '小规模增值税申报模拟', desc: '小规模增值税申报表模拟系统', link: 'zzs-xgm.html', icon: '💰', status: 'ok' },
            { title: '一般纳税人增值税申报模拟', desc: '一般纳税人增值税申报模拟系统', link: 'zzs-ybnsr.html', icon: '💰', status: 'ok' },
            { title: '所得税季报申报模拟', desc: '所得税季报申报模拟系统', link: 'sds-jb.html', icon: '💰', status: 'ok' },
            { title: '增值税预缴申报模拟', desc: '增值税预缴申报模拟系统', link: 'zzs-yjsb.html', icon: '💰', status: 'ok' },
            { title: '增值税预缴申报模拟', desc: '增值税预缴申报模拟系统', link: 'https://bant1588.github.io/sds-hsqj/', icon: '💰', status: 'ok' },
            { title: '更多工具', desc: '更多实用工具即将上线', link: '', icon: '✨', status: 'dev' }
        ];

        function renderTools(list, term = '') {
            const grid = document.getElementById('toolsGrid');
            const empty = document.getElementById('emptyState');
            grid.innerHTML = '';

            if (list.length === 0) {
                empty.classList.add('active');
                return;
            }
            empty.classList.remove('active');

            list.forEach(tool => {
                const card = document.createElement('div');
                card.className = `tool-card ${tool.status === 'dev' ? 'disabled' : ''}`;

                const linkHtml = tool.status === 'ok'
                    ? `<a href="${tool.link}" class="tool-link">立即使用 <span class="arrow">→</span></a>`
                    : `<span class="tool-link">敬请期待</span>`;

                card.innerHTML = `
                    <div class="tool-icon">${tool.icon}</div>
                    <h3 class="tool-title">${highlight(tool.title, term)}</h3>
                    <p class="tool-desc">${highlight(tool.desc, term)}</p>
                    ${linkHtml}
                `;

                if (tool.status === 'ok') {
                    card.onclick = (e) => { if (!e.target.closest('a')) location.href = tool.link; };
                }
                grid.appendChild(card);
            });
        }

        function highlight(text, term) {
            if (!term) return text;
            return text.replace(new RegExp(`(${term})`, 'gi'), '<mark style="background:#fbbf24;color:#000;padding:0 4px;border-radius:4px">$1</mark>');
        }

        function searchTools() {
            const term = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = term
                ? tools.filter(t => t.title.toLowerCase().includes(term) || t.desc.toLowerCase().includes(term))
                : tools;
            renderTools(filtered, term);
        }

        document.getElementById('searchInput').addEventListener('input', searchTools);
        document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchTools(); });

        renderTools(tools);
    </script>
</body>
</html>
